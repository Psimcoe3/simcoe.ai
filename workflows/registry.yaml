schema_version: 1
workflows:
  memory-seed:
    description: Import curated operator memory rows and rebuild memory projections.
    tags:
      - memory
      - curation
    required_vars:
      - source_file
    defaults:
      source_label: operator_seed
    steps:
      - name: import curated memory
        argv:
          - "{python}"
          - "scripts/indexed_memory.py"
          - "--config"
          - "{config}"
          - "import"
          - "--source-file"
          - "{source_file}"
          - "--source-label"
          - "{source_label}"
      - name: consolidate memory projections
        argv:
          - "{python}"
          - "scripts/indexed_memory.py"
          - "--config"
          - "{config}"
          - "consolidate"
      - name: rebuild memory pointer index
        argv:
          - "{python}"
          - "scripts/indexed_memory.py"
          - "--config"
          - "{config}"
          - "rebuild-index"
  retrieval-refresh:
    description: Rebuild the local retrieval corpus from the current grounded example set.
    tags:
      - retrieval
      - corpus
    defaults:
      source: data/raw/electrician_reference_examples.jsonl
      out: data/retrieval/electrician_reference_corpus.jsonl
      manifest: data/retrieval/electrician_reference_corpus.manifest.json
    steps:
      - name: rebuild retrieval corpus
        argv:
          - "{python}"
          - "scripts/build_retrieval_corpus.py"
          - "--source"
          - "{source}"
          - "--out"
          - "{out}"
          - "--manifest"
          - "{manifest}"
  benchmark-refresh:
    description: Rebuild the curated golden benchmark from the configured spec and source corpus.
    tags:
      - benchmark
      - evaluation
    defaults:
      source: data/raw/electrician_reference_examples.jsonl
      spec: evals/golden_electrician_spec.json
      out: evals/golden_electrician.jsonl
      manifest: evals/golden_electrician.manifest.json
    steps:
      - name: rebuild golden benchmark
        argv:
          - "{python}"
          - "scripts/build_golden_benchmark.py"
          - "--config"
          - "{config}"
          - "--source"
          - "{source}"
          - "--spec"
          - "{spec}"
          - "--out"
          - "{out}"
          - "--manifest"
          - "{manifest}"
  release-verify:
    description: Validate saved release artifacts and release results without rerunning training or inference.
    tags:
      - release
      - verification
    steps:
      - name: validate release artifacts
        argv:
          - "{python}"
          - "scripts/validate_release_artifacts.py"
          - "--config"
          - "{config}"
  staged-reference-import:
    description: Stage a reviewed archive list, rebuild the deduped batch view, and import actionable assets into repo-managed sources.
    tags:
      - sources
      - staging
      - import
    required_vars:
      - batch_name
      - archive_list_file
    defaults:
      source_dir: /mnt/c/Users/Paul/Downloads
      staging_root: data/staging/reference_archive_batches
      link_mode: hardlink
    steps:
      - name: stage selected archives
        argv:
          - "{python}"
          - "scripts/stage_reference_archives.py"
          - "--source-dir"
          - "{source_dir}"
          - "--staging-root"
          - "{staging_root}"
          - "--batch-name"
          - "{batch_name}"
          - "--archive-list-file"
          - "{archive_list_file}"
          - "--overwrite"
      - name: organize staged references
        argv:
          - "{python}"
          - "scripts/organize_staged_references.py"
          - "--batch-dir"
          - "{staging_root}/{batch_name}"
          - "--link-mode"
          - "{link_mode}"
          - "--overwrite"
      - name: import staged references
        argv:
          - "{python}"
          - "scripts/import_staged_reference_batch.py"
          - "--config"
          - "{config}"
          - "--staging-root"
          - "{staging_root}"
          - "--batch-name"
          - "{batch_name}"