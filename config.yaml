# config.yaml — centralised hyperparameters for the fine-tuning pipeline.
# Edit this file to change any setting; nothing is hardcoded in the scripts.

# ── Model ─────────────────────────────────────────────────────────────────
model:
  name: "unsloth/Meta-Llama-3.1-8B-bnb-4bit"   # HF hub id or local path
  max_seq_length: 2048                           # token budget per example
  load_in_4bit: true                             # NF4 quantisation
  dtype: null                                    # null → auto-detect (bf16 on Ampere+)

# ── LoRA / DoRA adapter ───────────────────────────────────────────────────
lora:
  r: 16
  lora_alpha: 16        # equal to r per rsLoRA guidance
  lora_dropout: 0       # 0 is required for Unsloth's optimised kernel path
  bias: "none"          # "none" is required for Unsloth's optimised kernel path
  target_modules:       # all attention AND MLP linear layers
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_dora: true        # DoRA: ~3.7 % accuracy gain over standard LoRA
  use_rslora: true      # rank-stabilised scaling for gradient stability

# ── Training ──────────────────────────────────────────────────────────────
training:
  output_dir: "models/adapters"
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4    # effective batch = 4 × 4 = 16
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  bf16: true
  fp16: false
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  seed: 3407    # popularised by the unsloth team; use consistently across all
                # split/shuffle ops for reproducible train-to-eval comparisons

# ── Data ──────────────────────────────────────────────────────────────────
data:
  raw_path: "data/raw/dataset.jsonl"
  processed_dir: "data/processed"
  validation_split: 0.10
  random_state: 3407  # same seed as training for consistent splits across runs

# ── Export ────────────────────────────────────────────────────────────────
export:
  merged_16bit_dir: "models/merged_16bit"
  gguf_dir: "models/gguf"
  gguf_quantisation: "q4_k_m"
  ollama_modelfile: "models/gguf/Modelfile"

# ── Evaluation ────────────────────────────────────────────────────────────
evaluation:
  results_path: "evals/results.json"
  judge_model: null   # set to an HF id or "openai/gpt-4o" to enable LLM-as-judge
