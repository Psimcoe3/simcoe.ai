# config.electrician.yaml — electrician-focused training configuration.

architecture:
  system_type: "grounded_multi_runtime"
  primary_runtime: "text"
  multimodal_runtime_enabled: false
  retrieval_layer_enabled: true
  geometry_rules_enabled: false
  grounded_answers_require_retrieval: true

routing:
  default_route: "text"
  route_fallbacks:
    text: "fail"
    retrieval: "text"
    deterministic_tool: "text"
    drawing_sheet: "fail"
    mixed: "fail"
  latency_budgets_ms:
    text: 1800
    retrieval: 2600
    deterministic_tool: 1200
    drawing_sheet: 5000
    mixed: 6500

source_registry:
  root: "/mnt/c/Users/Paul/OneDrive/Desktop/ElectricalAi Docs"
  manifest_path: "data/registry/electricalai_docs_registry.json"
  default_review_state: "review_required"
  default_data_family: "reference_unassigned"
  allow_auto_sft: false
  repo_namespace: "electricalai_docs"
  repo_sync_dir: "sources/managed"
  materialized_manifest_path: "data/registry/materialized_sources.json"

managed_sources:
  root: "sources/managed/electricalai_docs"
  reference_root: "sources/managed/electricalai_docs/retrieval/document"
  estimating_reference_root: "sources/managed/electricalai_docs/retrieval/document/estimating"
  estimating_pdf: "sources/managed/electricalai_docs/retrieval/document/estimating/2026_national_electrical_estimator_ebook.pdf"
  estimating_har_dir: "sources/managed/electricalai_docs/manual_review/other/estimating/RSmeans"
  code_training_reference_root: "sources/managed/electricalai_docs/retrieval/document/Electrical Code_Training"
  drawings_reference_root: "sources/managed/electricalai_docs/retrieval/document/Drawings"
  drawings_multimodal_root: "sources/managed/electricalai_docs/multimodal/image/Drawings"
  revit_reference_root: "sources/managed/electricalai_docs/retrieval/document/Revit"
  revit_family_dir: "sources/managed/electricalai_docs/geometry_rules/cad_bim/Revit/Families"
  structured_root: "sources/managed/electricalai_docs/manual_review/tabular"

multimodal:
  enabled_routes:
    - drawing_sheet
    - mixed
  drawing_asset_root: "sources/managed/electricalai_docs/multimodal/image/Drawings"
  observation_mode: "ocr_plus_layout"
  ocr_enabled: true
  max_pages_per_document: 6
  max_images_per_request: 12
  max_observation_chars: 6000
  model_name: null
  processor_name: null

model:
  name: "unsloth/Meta-Llama-3.1-8B-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_dora: false
  use_rslora: true

training:
  output_dir: "models/adapters-electrician"
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 1
  bf16: true
  fp16: false
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  seed: 3407

data:
  raw_path: "data/raw/electrician_reference_examples.jsonl"
  processed_dir: "data/processed_electrician"
  validation_split: 0.10
  random_state: 3407

export:
  merged_16bit_dir: "models/merged_16bit_electrician"
  gguf_dir: "models/gguf_electrician"
  gguf_quantisation: "q4_k_m"
  ollama_modelfile: "models/gguf_electrician/Modelfile"

evaluation:
  results_path: "evals/results_electrician.json"
  judge_model: "simcoe"
  golden_benchmark_path: "evals/golden_electrician.jsonl"
  num_examples: 100
  quick_num_examples: 8
  max_new_tokens: 192
  quick_max_new_tokens: 64
  inference_batch_size: 1
  judge_concurrency: 2

release:
  fail_on_threshold_breach: false
  require_retrieval_for_grounded_benchmark: true
  require_merged_smoke_test: true
  require_gguf_smoke_test: true
  smoke_test_prompt: "In one sentence, what is torque in an electrical motor context?"
  smoke_test_max_new_tokens: 48
  smoke_test_min_response_chars: 40
  ollama_model_name: "simcoe-electrician-smoke"
  quick_min_rouge1: 0.18
  quick_min_rouge2: 0.10
  quick_min_rougeL: 0.16
  quick_min_exact_match: 0.0
  full_min_rouge1: 0.22
  full_min_rouge2: 0.12
  full_min_rougeL: 0.18
  full_min_exact_match: 0.0
  min_avg_judge_score: 3.5
  category_thresholds:
    nccer_reference_summary:
      min_rouge1: 0.16
      min_rouge2: 0.08
      min_rougeL: 0.14
    contractor_guidance:
      min_rouge1: 0.16
      min_rouge2: 0.08
      min_rougeL: 0.14
    blueprint_reading:
      min_rouge1: 0.16
      min_rouge2: 0.08
      min_rougeL: 0.14
    estimating_methodology:
      min_rouge1: 0.16
      min_rouge2: 0.08
      min_rougeL: 0.14
    estimate_lookup:
      min_tool_success_rate: 1.0
    revit_entity_lookup:
      min_tool_success_rate: 1.0

retrieval:
  enabled: true
  corpus_path: "data/retrieval/electrician_reference_corpus.jsonl"
  manifest_path: "data/retrieval/electrician_reference_corpus.manifest.json"
  top_k: 3
  max_context_chars: 1600
  min_score: 2
  use_in_full_evaluation: true

memory:
  enabled: true
  provider: "file"
  root_dir: "data/memory_electrician"
  index_path: "data/memory_electrician/MEMORY.json"
  topics_dir: "data/memory_electrician/topics"
  events_path: "data/memory_electrician/events.jsonl"
  default_top_k: 3
  topic_candidate_limit: 8
  max_context_chars: 1200
  max_index_entries: 64
  max_summary_chars: 160
  max_supporting_observations: 3
  max_trace_results: 3
  max_trace_excluded: 3
  min_score: 2
  require_verification: true
  contradiction_policy: "mark_stale"
  exclude_contradicted_topics: true
  import_max_records: 250
  allowed_kinds:
    - operator_note
    - verified_fact
    - decision
    - exception
  exclude_statuses:
    - stale
    - retracted
  consolidation_min_events: 8

deterministic_tools:
  estimate_lookup:
    enabled: true
    index_path: "data/raw/estimate_index.jsonl"
    default_top_k: 5
    max_results: 10
    min_score: 2
    default_quantity: 1.0
  revit_entity_lookup:
    enabled: true
    index_path: "data/raw/revit_family_index.jsonl"
    default_top_k: 5
    max_results: 10
    min_score: 2

privacy:
  tracking: "tensorboard"
  telemetry: false