# config.electrician.yaml — electrician-focused training configuration.

model:
  name: "unsloth/Meta-Llama-3.1-8B-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_dora: false
  use_rslora: true

training:
  output_dir: "models/adapters-electrician"
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 1
  bf16: true
  fp16: false
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  seed: 3407

data:
  raw_path: "data/raw/electrician_reference_examples.jsonl"
  processed_dir: "data/processed_electrician"
  validation_split: 0.10
  random_state: 3407

export:
  merged_16bit_dir: "models/merged_16bit_electrician"
  gguf_dir: "models/gguf_electrician"
  gguf_quantisation: "q4_k_m"
  ollama_modelfile: "models/gguf_electrician/Modelfile"

evaluation:
  results_path: "evals/results_electrician.json"
  judge_model: "simcoe"
  num_examples: 100
  quick_num_examples: 8
  max_new_tokens: 192
  quick_max_new_tokens: 64
  inference_batch_size: 1
  judge_concurrency: 2

release:
  fail_on_threshold_breach: false
  quick_min_rouge1: 0.18
  quick_min_rouge2: 0.10
  quick_min_rougeL: 0.16
  quick_min_exact_match: 0.0
  full_min_rouge1: 0.22
  full_min_rouge2: 0.12
  full_min_rougeL: 0.18
  full_min_exact_match: 0.0
  min_avg_judge_score: 3.5

privacy:
  tracking: "tensorboard"
  telemetry: false